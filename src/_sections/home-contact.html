<section class="contact-bg" id="contact">
  <div class="section-inner">
    <div class="contact-inner">
      <div>

        <h2 class="section-title">Let's Have<br><em>a Conversation</em></h2>
        <div class="divider"></div>
        <p class="contact-desc">Whether it's a business conversation, a collaboration, or just a question about IT, AI, or the MSP world — I'm happy to talk. I respond to every genuine message.</p>
        <div class="contact-links">
          <a href="mailto:hsilva@ciolanding.com" class="contact-link">

          </a>
          <a href="https://www.linkedin.com/in/hernansilva" target="_blank" class="contact-link">

          </a>

      <div class="contact-form-area">

          <label>Your Name</label>

          <label>Message</label>
          <textarea placeholder="What's on your mind?"></textarea>
        </div>
        <div class="form-group">
          <label>Quick check: <span id="captcha-q">what is 0 + 0?</span></label>
          <input type="text" id="captcha-input" placeholder="Your answer" inputmode="numeric" autocomplete="off">
        </div>
        <button onclick="handleSubmit()" class="btn-primary" style="width:100%;cursor
